name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build entwine-agents.slnx --configuration Release
      - name: Test
        run: dotnet test entwine-agents.slnx --configuration Release --no-build --verbosity normal
