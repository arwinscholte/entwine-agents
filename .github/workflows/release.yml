name: Release

# Tag-driven publish: push a v* tag (matching the Version in src/Directory.Build.props) to pack and publish
# all packages. nuget.org uses Trusted Publishing (OIDC — no stored API key): the repo must be registered
# as a trusted publisher on nuget.org (repository arwinscholte/entwine-agents, workflow release.yml).
# GitHub Packages is published with the built-in GITHUB_TOKEN.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write   # OIDC for nuget.org Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build & test
        run: |
          dotnet build entwine-agents.slnx --configuration Release
          dotnet test entwine-agents.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack entwine-agents.slnx --configuration Release --no-build -o artifacts

      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: arwin.scholte   # nuget.org username owning the trusted-publishing policy

      - name: Push to nuget.org
        run: |
          dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
